# docker-compose.yml
# Canonical local stack for API/UI and split worker roles.
x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  target: runtime

x-app-env: &app-env
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"
  HF_HOME: /app/.cache/huggingface
  TRANSFORMERS_CACHE: /app/.cache/huggingface
  XDG_CACHE_HOME: /app/.cache
  SMARTCAMPUS_PROFILE: ${SMARTCAMPUS_PROFILE:-main}
  SMARTCAMPUS_VARIANT: ${SMARTCAMPUS_VARIANT:-}

x-app-volumes: &app-volumes
  - ./data:/app/data
  - ./models:/app/models
  - hf_cache:/app/.cache/huggingface

services:
  api:
    build: *app-build
    command: python -m uvicorn backend.api:app --host 0.0.0.0 --port 8000
    environment: *app-env
    init: true
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/docker/healthcheck_http.py", "http://127.0.0.1:8000/healthz", "--expect-json-ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes: *app-volumes

  worker_gpu:
    build: *app-build
    command: python -m backend.worker
    gpus: all
    environment:
      <<: *app-env
      SMARTCAMPUS_WORKER_ROLE: gpu
      CUDA_VISIBLE_DEVICES: ${SMARTCAMPUS_WORKER_GPU_DEVICES:-0}
    depends_on:
      api:
        condition: service_healthy
    init: true
    restart: unless-stopped
    volumes: *app-volumes

  worker_cpu:
    build: *app-build
    command: python -m backend.worker
    environment:
      <<: *app-env
      SMARTCAMPUS_WORKER_ROLE: cpu
    depends_on:
      api:
        condition: service_healthy
    init: true
    restart: unless-stopped
    volumes: *app-volumes

  worker_mt:
    build: *app-build
    command: python -m backend.worker
    environment:
      <<: *app-env
      SMARTCAMPUS_WORKER_ROLE: mt
    depends_on:
      api:
        condition: service_healthy
    init: true
    restart: unless-stopped
    volumes: *app-volumes

  ui:
    build: *app-build
    command: python -m streamlit run app/main.py --server.address 0.0.0.0 --server.port 8501
    environment: *app-env
    depends_on:
      api:
        condition: service_healthy
    init: true
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/docker/healthcheck_http.py", "http://127.0.0.1:8501"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    volumes: *app-volumes

volumes:
  hf_cache:
