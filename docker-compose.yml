# docker-compose.yml
# Reproducible stack for API/UI and split worker roles.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn backend.api:app --host 0.0.0.0 --port 8000
    environment:
      PYTHONUNBUFFERED: "1"
      SMARTCAMPUS_PROFILE: ${SMARTCAMPUS_PROFILE:-main}
      SMARTCAMPUS_VARIANT: ${SMARTCAMPUS_VARIANT:-}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - .:/app

  worker_gpu:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m backend.worker
    environment:
      PYTHONUNBUFFERED: "1"
      SMARTCAMPUS_PROFILE: ${SMARTCAMPUS_PROFILE:-main}
      SMARTCAMPUS_VARIANT: ${SMARTCAMPUS_VARIANT:-}
      SMARTCAMPUS_WORKER_ROLE: gpu
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  worker_cpu:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m backend.worker
    environment:
      PYTHONUNBUFFERED: "1"
      SMARTCAMPUS_PROFILE: ${SMARTCAMPUS_PROFILE:-main}
      SMARTCAMPUS_VARIANT: ${SMARTCAMPUS_VARIANT:-}
      SMARTCAMPUS_WORKER_ROLE: cpu
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  worker_mt:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m backend.worker
    environment:
      PYTHONUNBUFFERED: "1"
      SMARTCAMPUS_PROFILE: ${SMARTCAMPUS_PROFILE:-main}
      SMARTCAMPUS_VARIANT: ${SMARTCAMPUS_VARIANT:-}
      SMARTCAMPUS_WORKER_ROLE: mt
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m streamlit run app/main.py --server.address 0.0.0.0 --server.port 8501
    environment:
      PYTHONUNBUFFERED: "1"
      SMARTCAMPUS_PROFILE: ${SMARTCAMPUS_PROFILE:-main}
      SMARTCAMPUS_VARIANT: ${SMARTCAMPUS_VARIANT:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    restart: unless-stopped
    volumes:
      - .:/app

  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["with_vllm"]
    environment:
      PYTHONUNBUFFERED: "1"
    command: >
      --model ${VLLM_MODEL_ID:-Qwen/Qwen3-4B-Instruct-2507}
      --host 0.0.0.0
      --port 8001
      --dtype ${VLLM_DTYPE:-float16}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
    ports:
      - "8001:8001"
    restart: unless-stopped
    volumes:
      - .:/app

  mt_service:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["with_ct2"]
    command: python -c "import ctranslate2, sentencepiece; print('CTranslate2 backend is available')"
    environment:
      PYTHONUNBUFFERED: "1"
    restart: "no"
