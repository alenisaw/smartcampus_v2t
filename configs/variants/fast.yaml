runtime:
  structuring_mode: rules
  summary_mode: deterministic
  summary_polish_enabled: false

video:
  target_fps: 2.0
  analysis_fps: 2.0
  decode_resolution: [960, 540]
  max_frames: 2500
  min_change_threshold: 0.04
  dark_threshold: 32.0
  blur_threshold: 40.0
  lazy_motion_threshold: 0.03

clips:
  window_sec: 3.0
  stride_sec: 2.0
  max_clip_frames: 12
  keyframe_policy: first

model:
  batch_size: 4
  max_batch_frames: 72
  max_new_tokens: 96

search:
  rerank_enabled: false
  rerank_top_k: 15
  candidate_k_sparse: 120
  candidate_k_dense: 120
  dense_input_mode: text
  embedding_dim: 768

translation:
  post_edit_targets: [summary]
