video:
  analysis_fps: 4.0
  target_fps: 4.0
  decode_resolution: [1280, 720]
  min_change_threshold: 0.025
  dark_threshold: 26.0
  blur_threshold: 28.0
  lazy_motion_threshold: 0.015

clips:
  window_sec: 6.0
  stride_sec: 2.0
  max_clip_frames: 20
  keyframe_policy: sharpest

search:
  candidate_k_sparse: 260
  candidate_k_dense: 260
  rerank_top_k: 50
  w_dense: 0.60
  w_bm25: 0.40
  dense_input_mode: text_keyframe
  embedding_dim: 1024

translation:
  post_edit_targets: [summary, reports, qa, selected_segments]
