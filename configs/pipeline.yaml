paths:
  root_dir: ..
  data_dir: data

  videos_dir: data/videos
  cache_dir: data/cache
  indexes_dir: data/indexes
  thumbs_dir: data/thumbs

  models_dir: models

  dnn_face_proto: models/face_detector/deploy.prototxt
  dnn_face_model: models/face_detector/res10_300x300_ssd_iter_140000.caffemodel


ui:
  langs: ["ru", "kz", "en"]
  default_lang: "ru"
  cache_ttl_sec: 2

  assets_dir: app/assets
  ui_text_path: app/assets/ui_text.json
  styles_path: app/assets/styles.css
  logo_path: app/assets/logo.png


search:
  embed_model_name: BAAI/bge-m3
  query_prefix: "query: "
  passage_prefix: "passage: "
  normalize_text: true
  lemmatize: true
  fallback_langs: ["en"]
  translate_queries: true
  embed_cache: true
  w_bm25: 0.45
  w_dense: 0.55
  candidate_k_sparse: 200
  candidate_k_dense: 200
  fusion: rrf
  rrf_k: 60
  dedupe_mode: overlap
  dedupe_tol_sec: 1.0
  dedupe_overlap_thr: 0.7


video:
  target_fps: 3.0
  model_input_size: [256, 256]
  min_change_threshold: 0.03
  dark_threshold: 30.0
  save_small_frames: false

  face_blur: true
  max_frames: 5000


video_io:
  jpeg_quality_frames: 82
  jpeg_quality_small: 75

  face_detect_every_saved: 6
  face_detect_force_on_scenecut: true
  face_blur_strength: 31
  face_conf_threshold: 0.5


clips:
  window_sec: 4.0
  stride_sec: 2.0
  min_clip_frames: 2
  max_clip_frames: 16


model:
  model_name_or_path: models/qwen3-vl-2b-instruct
  device: cuda
  dtype: fp16
  language: en

  batch_size: 3
  max_batch_frames: 64
  max_new_tokens: 128
  temperature: 0.4
  top_p: 0.9
  top_k: 40
  repetition_penalty: 1.1
  do_sample: true
  attn_implementation: auto
  timeout_sec: 60

translation:
  model_name_or_path: facebook/nllb-200-distilled-1.3B
  device: cuda
  dtype: fp16
  batch_size: 8
  max_new_tokens: 128
  source_lang: en
  target_langs: ["ru", "kz"]
  cache_enabled: true


runtime:
  seed: 42
  num_workers: 4
  log_level: INFO


  overwrite_existing: false

  strict_paths: true

  torch_threads: 0
  matmul_precision: high
  autocast_infer: true
  torch_compile: true
  torch_compile_mode: reduce-overhead
  torch_compile_fullgraph: false

backend:
  scheme: "http"
  host: "127.0.0.1"
  port: 8000

jobs:
  dir: data/jobs

queue:
  dir: data/queue

locks:
  dir: data/locks

worker:
  poll_interval_sec: 1
  lease_sec: 30
  heartbeat_sec: 5
  short_first: true
  max_concurrent_jobs: 1

index:
  auto_update_on_done: true

webhook:
  enabled: false
  url: ""
  timeout_sec: 5


